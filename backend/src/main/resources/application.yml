server:
  port: 8080

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:backend/.env[.properties]
  application:
    name: devops-ai-assistant
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3309}/${MYSQL_DATABASE:devops_ai}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:1122334}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:7379}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    expires-seconds: ${JWT_EXPIRES_SECONDS:7200}
  ai:
    provider: ${APP_AI_PROVIDER:OpenAI}
    api-style: ${APP_AI_API_STYLE:RESPONSES}
    base-url: ${APP_AI_BASE_URL:https://api.nexustokenai.com}
    model: ${APP_AI_MODEL:gpt-5.5}
    api-key: ${APP_AI_API_KEY:}
    max-tokens: ${APP_AI_MAX_TOKENS:4096}
    temperature: ${APP_AI_TEMPERATURE:0.3}
    timeout-seconds: ${APP_AI_TIMEOUT_SECONDS:60}
